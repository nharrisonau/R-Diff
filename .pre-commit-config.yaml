repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents"]
  - repo: local
    hooks:
      - id: python-script-compile
        name: python script compile check
        entry: python3 -m compileall -q targets/malicious/scripts targets/evaluation
        language: system
        pass_filenames: false
