name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_full_build:
        description: "Run scheduled full malicious build job"
        required: false
        default: "false"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  quality:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install quality dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pre-commit
      - name: Run pre-commit checks
        run: pre-commit run --all-files
      - name: Run malicious script tests
        run: python3 -m unittest discover -s targets/malicious/scripts/tests -v
      - name: Run benign script tests
        run: python3 -m unittest discover -s targets/benign/scripts/tests -v
      - name: Verify metadata and provenance
        run: |
          python3 targets/malicious/scripts/verify_sources.py
          python3 targets/malicious/scripts/verify_target_metadata.py
          python3 targets/benign/scripts/verify_metadata.py

  smoke_build:
    runs-on: ubuntu-22.04
    needs: quality
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install smoke-build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libpam0g-dev libcap-dev
      - name: Build representative malicious targets (STRICT=1)
        run: |
          make -C targets/malicious/authentic/vsftpd-2.3.4 clean all STRICT=1
          make -C targets/malicious/synthetic/lua-5.4.7 clean all STRICT=1
      - name: Run collector smoke
        run: |
          python3 targets/malicious/scripts/collect_outputs_v2.py --repo-root . --out-base outputs --strip-tool true
          test -f outputs/v2/reports/malicious_baselines_report.csv

  scheduled_full_build:
    runs-on: ubuntu-22.04
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full_build == 'true')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install full-build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y autoconf autogen automake bison \
            build-essential cmake libasound2-dev libboost-all-dev libbrotli-dev libbz2-dev \
            libcap-dev libdeflate-dev libflac-dev libharfbuzz-dev libjbig-dev libjpeg-dev \
            liblerc-dev liblcms2-dev liblzma-dev libmp3lame-dev libmpg123-dev libogg-dev \
            libopenjp2-7-dev libopus-dev libpam0g-dev libsqlite3-dev libssl-dev libtiff-dev libtool \
            libvorbis-dev libwebp-dev libxml2-dev libzstd-dev netcat-traditional pkg-config re2c \
            zip tclsh
      - name: Scheduled full malicious build (no historical baselines)
        run: make -C targets malicious STRICT=1
