name: CI

on:
  push:
  pull_request:

jobs:
  build_and_check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
            python-version: '3.13'
      # Run pre-commit checks.
      - uses: pre-commit/action@v3.0.1
      - name: Build all targets, all variants
        run: make --directory=./targets/ all
      - name: Verify build success
        run: make --question --directory=./targets/ all
